<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pardus Asistan - Bakımda</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
        }
        h1 { color: #f57f17; margin-bottom: 10px; }
        p { line-height: 1.6; color: #666; }
        .icon { font-size: 3rem; color: #f57f17; margin-bottom: 20px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-tools"></i></div>
        <h1>Kısa Bir Mola</h1>
        <p>Pardus Asistan, daha iyi hizmet verebilmek için <strong>güncelleme ve bakım</strong> çalışmasındadır.</p>
        <p>En kısa sürede tekrar yayında olacağız.</p>
        <p style="font-size: 0.8rem; margin-top: 20px; color: #999;">Anlayışınız için teşekkürler.</p>
    </div>
</body>
</html>
